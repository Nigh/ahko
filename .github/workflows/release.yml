name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Inject version and update_log
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          $prevTag = git tag --sort=-v:refname | Where-Object { $_ -ne $tag } | Select-Object -First 1
          $commits = git log "$prevTag..$tag" --pretty=format:"- %s" | Out-String
          $log = "`n(`n$commits`n)"
          $content = Get-Content meta.ahk -Raw
          $content = $content -replace 'version := ".*?"', "version := `"$ver`""
          $content = $content -replace '(?s)update_log := "\r?\n\(.*?\)"', "update_log := `"$log`""
          Set-Content meta.ahk -Value $content -NoNewline

      - name: Build
        run: ./ahk-compile-toolset/AutoHotkey64.exe ./distribution.ahk

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/ahko.zip
            dist/version.txt
          generate_release_notes: true
